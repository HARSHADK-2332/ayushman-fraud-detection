```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ayushman Fraud Detection</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364,#00c6ff);
background-size:800% 800%;
animation:bgmove 15s infinite;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* moving background */

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* pulse hospital line */

body::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:5px;
background:red;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

/* main container */

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
width:500px;
text-align:center;
box-shadow:0 0 25px cyan;
}

h1{
text-shadow:0 0 15px cyan;
}

/* upload box */

.upload-box{
border:2px dashed white;
padding:30px;
border-radius:15px;
margin:20px 0;
}

button{
padding:15px 30px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#00f2fe,#4facfe);
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 15px cyan;
}

button:hover{
transform:scale(1.1);
}

/* result box */

.result{
display:none;
margin-top:20px;
padding:20px;
border-radius:15px;
background:rgba(0,0,0,0.4);
}

/* risk meter */

.meter{
width:100%;
height:20px;
background:#333;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

#riskBar{
height:100%;
width:0%;
background:linear-gradient(90deg,green,yellow,red);
transition:1s;
}

/* scanner animation */

.scanner{
width:100%;
height:3px;
background:cyan;
margin-top:20px;
animation:scan 2s infinite;
}

@keyframes scan{
0%{transform:translateY(0)}
50%{transform:translateY(100px)}
100%{transform:translateY(0)}
}

</style>
</head>

<body>

<div class="container">

<h1>🏥 AYUSHMAN FRAUD DETECTION SYSTEM</h1>
<p>AI Powered Hospital Bill Risk Analysis 🚑</p>

<form id="uploadForm">

<div class="upload-box">
📄 Upload Hospital Bill<br><br>
<input type="file" name="file" required>
</div>

<button type="submit">🔍 Analyze Bill</button>

</form>

<div class="scanner"></div>

<div class="result" id="resultBox">

<h3>Fraud Risk Result</h3>

<p id="riskText">Risk Score: --</p>

<div class="meter">
<div id="riskBar"></div>
</div>

<p id="message"></p>

</div>

</div>

<script>

document.getElementById("uploadForm").addEventListener("submit", async function(e){

e.preventDefault();

const formData=new FormData(this);

const response=await fetch("https://ayushman-fraud-detection-1.onrender.com/predict",{
method:"POST",
body:formData
});

const data=await response.json();

document.getElementById("resultBox").style.display="block";

document.getElementById("riskText").innerText="Risk Score: "+data.risk_score;

document.getElementById("message").innerText=data.message;

document.getElementById("riskBar").style.width=data.risk_score+"%";

});

</script>

</body>
</html>
