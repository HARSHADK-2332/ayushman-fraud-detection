```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayushman Fraud Detection</title>

<style>

/* ===== Background Animation ===== */

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
height:100vh;
background: linear-gradient(270deg,#0f2027,#203a43,#2c5364,#00c6ff);
background-size:800% 800%;
animation: gradientMove 15s ease infinite;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* floating medical icons */

.icon{
position:absolute;
font-size:40px;
opacity:0.15;
animation:float 10s infinite linear;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* ===== Main Container ===== */

.container{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
width:600px;
text-align:center;
box-shadow:0 0 40px rgba(0,255,255,0.5);
}

/* ===== Title ===== */

h1{
font-size:36px;
margin-bottom:10px;
text-shadow:0 0 10px cyan,0 0 20px cyan;
}

h2{
font-weight:normal;
margin-bottom:30px;
color:#d6faff;
}

/* ===== Upload Area ===== */

.upload-box{
border:2px dashed white;
padding:30px;
border-radius:15px;
margin-bottom:20px;
transition:0.3s;
}

.upload-box:hover{
background:rgba(255,255,255,0.1);
box-shadow:0 0 20px cyan;
}

/* ===== Button ===== */

button{
background:linear-gradient(45deg,#00f2fe,#4facfe);
border:none;
padding:15px 35px;
border-radius:50px;
font-size:18px;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px cyan;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 30px cyan;
}

/* ===== Result Card ===== */

.result{
margin-top:25px;
padding:20px;
border-radius:15px;
background:rgba(0,0,0,0.3);
display:none;
}

.risk{
font-size:28px;
font-weight:bold;
color:#00ffd5;
}

</style>
</head>

<body>

<!-- Floating Medical Icons -->

<div class="icon" style="left:5%">💊</div>
<div class="icon" style="left:20%">🩺</div>
<div class="icon" style="left:40%">🏥</div>
<div class="icon" style="left:60%">💉</div>
<div class="icon" style="left:80%">🧬</div>

<div class="container">

<h1>🏥 AYUSHMAN FRAUD DETECTION SYSTEM</h1>
<h2>AI Powered Hospital Bill Risk Analysis 🚑</h2>

<form id="uploadForm">

<div class="upload-box">
<p>📄 Upload Hospital Bill</p>
<input type="file" name="file" required>
</div>

<button type="submit">🔍 Analyze Bill</button>

</form>

<div class="result" id="resultBox">
<h3>🧾 Fraud Analysis Result</h3>
<p class="risk" id="riskScore">Risk Score: --</p>
<p id="message"></p>
</div>

</div>

<script>

document.getElementById("uploadForm").addEventListener("submit",async function(e){

e.preventDefault();

const formData=new FormData(this);

const response=await fetch("http://127.0.0.1:8000/predict",{
method:"POST",
body:formData
});

const data=await response.json();

document.getElementById("resultBox").style.display="block";
document.getElementById("riskScore").innerText="Risk Score: "+data.risk_score;
document.getElementById("message").innerText=data.message;

});

</script>

</body>
</html>
